name: Build Desktop App

on:
  push:
    branches: [main]
    paths:
      - 'desktop/**'

permissions:
  contents: write

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: desktop/package-lock.json

      - name: Install dependencies
        working-directory: desktop
        run: npm ci

      - name: Build
        working-directory: desktop
        run: npx electron-vite build

      - name: Package (Windows portable)
        working-directory: desktop
        run: npx electron-builder --win --publish never
        env:
          CSC_IDENTITY_AUTO_DISCOVERY: false

      - name: Zip win-unpacked
        shell: pwsh
        run: Compress-Archive -Path desktop/dist/win-unpacked/* -DestinationPath desktop/dist/OpenMemory-Windows.zip -Force

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: windows-zip
          path: desktop/dist/OpenMemory-Windows.zip

  build-mac:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: desktop/package-lock.json

      - name: Install dependencies
        working-directory: desktop
        run: npm ci

      - name: Build & package (macOS)
        working-directory: desktop
        run: npx electron-vite build && npx electron-builder --mac --publish never
        env:
          CSC_IDENTITY_AUTO_DISCOVERY: false

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: mac-dmg
          path: desktop/dist/*.dmg

  release:
    needs: [build-windows, build-mac]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: windows-zip
          path: artifacts/

      - uses: actions/download-artifact@v4
        with:
          name: mac-dmg
          path: artifacts/
        continue-on-error: true

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: desktop-latest
          name: OpenMemory Desktop (latest)
          body: |
            Install OpenMemory Desktop to pin notes as floating windows on your desktop.

            **Windows:** Download `OpenMemory-Windows.zip`, extract, run `OpenMemory.exe`.
            **macOS:** Download `OpenMemory.dmg`, open it, drag to Applications.

            No setup needed — connects to the cloud automatically.
          files: artifacts/*
          make_latest: true
