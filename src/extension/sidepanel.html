<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>OpenMemory</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
      background: #000000;
      color: #FFFFFF;
      min-height: 100vh;
      width: 100%;
    }

    /* Fixed Header */
    .header {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      background: #000000;
      z-index: 100;
      border-bottom: 1px solid #333333;
    }

    .nav {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 12px 16px;
    }

    .logo {
      font-size: 14px;
      font-weight: 600;
      letter-spacing: -0.02em;
    }

    .nav-link {
      font-size: 12px;
      color: #888888;
      text-decoration: none;
    }

    .search-container {
      padding: 12px 16px;
    }

    .search-wrapper {
      position: relative;
    }

    .search-input {
      width: 100%;
      padding: 12px 14px;
      font-size: 14px;
      font-family: inherit;
      background: #000000;
      border: 1px solid #333333;
      border-radius: 6px;
      color: #FFFFFF;
      outline: none;
      transition: border-color 0.15s ease;
    }

    .search-input::placeholder {
      color: #888888;
    }

    .search-input:focus {
      border-color: #FFFFFF;
    }

    .suggestions {
      position: absolute;
      top: 100%;
      left: 0;
      right: 0;
      background: #0a0a0a;
      border: 1px solid #333333;
      border-top: none;
      border-radius: 0 0 6px 6px;
      max-height: 200px;
      overflow-y: auto;
      z-index: 100;
      display: none;
    }

    .suggestions.active {
      display: block;
    }

    .suggestion-item {
      padding: 8px 12px;
      font-size: 12px;
      color: #888888;
      cursor: pointer;
      border-bottom: 1px solid #222222;
    }

    .suggestion-item:last-child {
      border-bottom: none;
    }

    .suggestion-item:hover,
    .suggestion-item.selected {
      background: #111111;
      color: #FFFFFF;
    }

    /* Main Content - with padding for fixed header */
    .container {
      padding: 130px 16px 16px 16px;
    }

    .active-filter {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 4px 8px;
      font-size: 11px;
      background: #1a1a1a;
      border: 1px solid #333333;
      border-radius: 4px;
      color: #888888;
      margin-bottom: 12px;
    }

    .active-filter .remove-filter {
      cursor: pointer;
      color: #666666;
    }

    .active-filter .remove-filter:hover {
      color: #FFFFFF;
    }

    .status {
      font-size: 12px;
      color: #888888;
      margin-bottom: 12px;
    }

    .results {
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    /* Card Styles */
    .card {
      background: #000000;
      border: 1px solid #333333;
      border-radius: 8px;
      overflow: hidden;
      text-decoration: none;
      display: block;
      transition: border-color 0.15s ease, transform 0.15s ease;
    }

    .card:hover {
      border-color: #555555;
      transform: translateY(-2px);
    }

    .card-thumbnail {
      width: 100%;
      aspect-ratio: 16 / 9;
      background: #111111;
      overflow: hidden;
      position: relative;
    }

    .card-thumbnail img.card-screenshot {
      width: 100%;
      height: 100%;
      object-fit: cover;
      object-position: top;
      transition: opacity 0.2s ease;
    }

    .card-thumbnail img.card-screenshot.loading {
      opacity: 0;
    }

    .card-thumbnail img.card-screenshot.loaded {
      opacity: 1;
    }

    .card-thumbnail .placeholder {
      position: absolute;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #111111;
    }

    .card-thumbnail .placeholder img {
      width: 32px;
      height: 32px;
      opacity: 0.5;
    }

    .card-content {
      padding: 14px 16px;
    }

    .card-title {
      font-size: 14px;
      font-weight: 500;
      color: #FFFFFF;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      margin-bottom: 6px;
    }

    .card-path {
      font-size: 12px;
      color: #888888;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .card-path span {
      color: #555555;
      margin: 0 6px;
    }

    .card-meta {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-top: 8px;
    }

    .source-badge {
      font-size: 10px;
      font-weight: 500;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      padding: 3px 6px;
      border-radius: 4px;
      background: #1a1a1a;
      color: #888888;
    }

    .load-more-btn {
      width: 100%;
      padding: 10px;
      font-size: 13px;
      font-family: inherit;
      background: #000000;
      border: 1px solid #333333;
      border-radius: 6px;
      color: #FFFFFF;
      cursor: pointer;
      margin-top: 12px;
    }

    .load-more-btn:hover {
      border-color: #555555;
      background: #111111;
    }

    .load-more-btn:disabled {
      opacity: 0.5;
      cursor: not-allowed;
    }

    .empty-state {
      text-align: center;
      padding: 40px 20px;
      color: #888888;
    }

    .empty-state h2 {
      font-size: 14px;
      font-weight: 500;
      color: #FFFFFF;
      margin-bottom: 6px;
    }

    .loading {
      text-align: center;
      padding: 40px;
      color: #888888;
    }
  </style>
</head>
<body>
  <header class="header">
    <nav class="nav">
      <div class="logo">OpenMemory</div>
      <span class="nav-link" id="item-count">Loading...</span>
    </nav>
    <div class="search-container">
      <div class="search-wrapper">
        <input
          type="text"
          id="search-input"
          class="search-input"
          placeholder="Search inspirations... (@ for folders)"
          autofocus
        >
        <div id="suggestions" class="suggestions"></div>
      </div>
    </div>
  </header>

  <main class="container">
    <div id="active-filter" class="active-filter" style="display: none;">
      <span id="filter-text"></span>
      <span class="remove-filter" id="remove-filter">×</span>
    </div>

    <div id="status" class="status"></div>
    <div id="results" class="results"></div>
    <button id="load-more-btn" class="load-more-btn" style="display: none;">Load more</button>
  </main>

  <script src="search.js"></script>
</body>
</html>
